apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage-app
  template:
    metadata:
      labels:
        app: storage-app
    spec:
      containers:
      - name: storage-container
        image: nginx
        command: ["sleep","3600"]
        volumeMounts:
        - name: storage
          mountPath: /workspace
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: storage-pvc