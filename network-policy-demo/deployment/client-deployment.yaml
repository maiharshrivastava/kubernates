apiVersion: apps/v1
kind: Deployment

metadata:
  name: client
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: client

  template:

    metadata:
      labels:
        app: client

    spec:
      containers:
      - name: client
        image: busybox

        command:
        - sh
        - -c
        - |
          sleep 3600