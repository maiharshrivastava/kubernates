apiVersion: apps/v1
kind: Deployment

metadata:
  name: blocked
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: blocked

  template:

    metadata:
      labels:
        app: blocked

    spec:

      containers:
      - name: blocked
        image: busybox

        command:
        - sh
        - -c
        - |
          sleep 3600